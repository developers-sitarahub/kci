{% extends "admin/change_form.html" %}
{% load i18n unfold %}

{% block content %}
    {# ===== Extra Top Action Bar (Save Buttons) ===== #}
    <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6 pb-6 border-b border-base-200 dark:border-base-800">
        <div>
            <h1 class="text-xl font-bold text-base-900 dark:text-base-100">{{ title }}</h1>
            <p class="text-xs text-base-500 mt-1">Manage your record details below</p>
        </div>
        
        <div class="flex items-center gap-3">
            {# Save Button at Top #}
            <button type="submit" name="_save" class="bg-primary-600 hover:bg-primary-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-all flex items-center gap-2 text-sm uppercase tracking-wider" style="background-color: #c2a990 !important;">
                <span class="material-symbols-outlined text-sm">save</span>
                {% translate 'Save Now' %}
            </button>
            
            <button type="submit" name="_continue" class="bg-base-100 hover:bg-base-200 text-base-700 font-semibold py-2 px-4 rounded-lg border border-base-300 transition-all text-xs dark:bg-base-800 dark:border-base-700 dark:text-base-300">
                {% translate 'Save & Continue' %}
            </button>
        </div>
    </div>

    {{ block.super }}
{% endblock %}
